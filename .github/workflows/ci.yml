name: Joblix CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    name: Backend Build and Integration Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: 'backend/package-lock.json'

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm install

    - name: Generate Prisma Client
      run: |
        cd backend
        npx prisma generate

    - name: Run Schema Sync
      run: |
        cd backend
        npx prisma db push

    - name: Run Integration Tests
      run: |
        cd backend
        npm run test

  frontend-build:
    name: Frontend Production Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm install

    - name: Compile and Build Assets
      run: |
        cd frontend
        npm run build
